<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cinta — Promed Mentor AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #2F449B;
    --primary-dark: #233580;
    --primary-light: #EEF1F9;
    --bot-bubble: #EDF1F5;
    --user-bubble: #2F449B;
    --bg: #F9FBFC;
    --surface: #FFFFFF;
    --border: #E4E9F0;
    --text-main: #1A1F2E;
    --text-muted: #6B7594;
    --text-light: #9AA3BF;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 8px 40px rgba(47,68,155,0.14), 0 2px 8px rgba(47,68,155,0.08);
    --shadow-fab: 0 4px 20px rgba(47,68,155,0.30);
  }

  body { font-family: var(--font); background: var(--bg); }

  /* ── FAB ── */
  #cinta-fab {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--primary);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-fab);
    z-index: 9999;
    transition: transform .2s ease, box-shadow .2s ease;
  }
  /* Halo ring — feedback hover / tekan (sesuai ref. close button) */
  #cinta-fab {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 62px;
  height: 62px;
  border-radius: 50%;
  background: linear-gradient(135deg, #4A5FC4 0%, #2F449B 60%, #1e2f72 100%);
  box-shadow: 0 4px 20px rgba(47,68,155,0.45), 0 0 0 0 rgba(47,68,155,0.3);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s;
  animation: fabPulse 3s ease-in-out infinite;
  overflow: hidden;
  }
  #cinta-fab:active {
  transform: scale(0.92);
  }
  #cinta-fab:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 28px rgba(47,68,155,0.55),
              0 0 0 8px rgba(47,68,155,0.1);
  animation: none;
  }
  #cinta-fab:hover { transform: scale(1.06); box-shadow: 0 6px 28px rgba(47,68,155,0.38); }
  #cinta-fab:active { transform: scale(0.98); }
  #cinta-fab svg { transition: transform .25s ease; }
  #cinta-fab svg.icon-chat { width: 24px; height: 24px; }
  #cinta-fab svg.icon-close {
    position: absolute;
    width: 13px;
    height: 13px;
    transform: scale(0) rotate(-90deg);
  }
  #cinta-fab.open svg.icon-chat { transform: scale(0) rotate(90deg); }
  #cinta-fab.open svg.icon-close { transform: scale(1) rotate(0deg); }

  @keyframes fabPulse {
  0%, 100% {
    box-shadow: 0 4px 20px rgba(47,68,155,0.45),
                0 0 0 0 rgba(47,68,155,0.3);
  }
  50% {
    box-shadow: 0 4px 20px rgba(47,68,155,0.45),
                0 0 0 10px rgba(47,68,155,0);
  }
  }

  /* ── WIDGET ── */
  #cinta-widget {
    position: fixed;
    bottom: 96px;
    right: 28px;
    width: min(92vw, 360px);
    height: min(82vh, 560px);
    background: var(--surface);
    border-radius: 16px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 9998;
    transform: translateY(20px) scale(0.97);
    opacity: 0;
    pointer-events: none;
    transition: transform .25s cubic-bezier(.34,1.56,.64,1), opacity .2s ease;
    border: 1px solid var(--border);
  }
  #cinta-widget.open {
    transform: translateY(0) scale(1);
    opacity: 1;
    pointer-events: all;
  }

  /* ── HEADER ── */
  .cw-header {
    background: var(--primary);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .cw-avatar {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: rgba(255,255,255,0.14);
    border: 3px solid rgba(255,255,255,0.34);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }
  .cw-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .cw-avatar svg { width: 26px; height: 26px; display: none; }
  .cw-header-info { flex: 1; min-width: 0; }
  .cw-name {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    letter-spacing: .01em;
    line-height: 1;
  }
  .cw-status {
    font-size: 11.5px;
    color: rgba(255,255,255,0.65);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    line-height: 1;
  }
  .cw-status-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #6EE7B7;
    flex-shrink: 0;
    box-shadow: 0 0 0 0 rgba(110, 231, 183, 0.55);
    animation: status-blink 1.6s ease-in-out infinite;
  }
  @keyframes status-blink {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(110, 231, 183, 0.45); }
    50% { opacity: 0.45; box-shadow: 0 0 0 4px rgba(110, 231, 183, 0); }
  }
  .cw-badge {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.75);
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 4px 8px;
    letter-spacing: .04em;
    white-space: nowrap;
  }

  /* ── MESSAGES ── */
  .cw-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .cw-messages::-webkit-scrollbar { width: 4px; }
  .cw-messages::-webkit-scrollbar-track { background: transparent; }
  .cw-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Date divider */
  .cw-date {
    text-align: center;
    font-size: 10.5px;
    font-weight: 500;
    color: var(--text-light);
    letter-spacing: .06em;
    text-transform: uppercase;
    margin: 2px 0 4px;
  }

  /* Message row */
  .cw-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  .cw-row.user { justify-content: flex-end; }
  .cw-row.bot { justify-content: flex-start; }

  .cw-msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--primary-light);
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    align-self: flex-end;
  }
  .cw-msg-avatar svg { width: 14px; height: 14px; }
  .cw-msg-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
  }

  .cw-bubble {
    max-width: 78%;
    padding: 10px 13px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.55;
    word-break: break-word;
  }
  .cw-row.bot .cw-bubble {
    background: var(--bot-bubble);
    color: var(--text-main);
    border-bottom-left-radius: 4px;
  }
  .cw-row.user .cw-bubble {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  /* Typing indicator */
  .cw-typing-dots {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 4px 2px;
  }
  .cw-typing-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: dot-bounce 1.2s infinite ease-in-out;
  }
  .cw-typing-dots span:nth-child(2) { animation-delay: .2s; }
  .cw-typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes dot-bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: .4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── QUICK BUTTONS ── */
  .cw-quick {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    padding: 10px 14px 12px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .cw-quick-btn {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    color: var(--primary);
    background: var(--primary-light);
    border: 1px solid rgba(47,68,155,0.18);
    border-radius: 20px;
    padding: 5px 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s, color .15s, border-color .15s;
    letter-spacing: .01em;
  }
  .cw-quick-btn:hover {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  /* ── INPUT ── */
  .cw-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .cw-input {
    flex: 1;
    font-family: var(--font);
    font-size: 13.5px;
    color: var(--text-main);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    outline: none;
    resize: none;
    line-height: 1.45;
    max-height: 90px;
    transition: border-color .15s;
  }
  .cw-input::placeholder { color: var(--text-light); }
  .cw-input:focus { border-color: var(--primary); }
  .cw-send {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: var(--primary);
    border: 2px solid rgba(255,255,255,0.22);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .15s, transform .15s;
  }
  .cw-send:hover { background: var(--primary-dark); transform: scale(1.04); }
  .cw-send:disabled { background: var(--border); cursor: not-allowed; transform: none; }
  .cw-send svg { width: 23px; height: 23px; }

  .cw-footer {
    text-align: center;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-light);
    letter-spacing: .02em;
    padding: 8px 14px 12px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* Mobile */
  @media (max-width: 420px) {
    #cinta-widget {
      width: calc(100vw - 18px);
      right: 9px;
      bottom: 76px;
      border-radius: 18px;
      height: 82vh;
      max-height: 82vh;
    }
    .cw-header {
      padding: 14px 14px;
      gap: 10px;
    }
    .cw-avatar {
      width: 46px;
      height: 46px;
      border-width: 2px;
    }
    .cw-name { font-size: 13.5px; }
    .cw-status { font-size: 11px; margin-top: 3px; }
    .cw-badge { font-size: 12px; padding: 5px 10px; }
    .cw-input-row { padding: 10px; }
    .cw-send { width: 46px; height: 46px; }
    .cw-send svg { width: 20px; height: 20px; }
    #cinta-fab { bottom: 16px; right: 16px; }
  }
</style>
</head>
<body>

<!-- FAB -->
<button id="cinta-fab" aria-label="Buka Cinta Mentor">
  <svg class="icon-chat" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <svg class="icon-close" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</button>

<!-- WIDGET -->
<div id="cinta-widget" role="dialog" aria-label="Cinta Mentor Chat">
  <!-- Header -->
  <div class="cw-header">
    <div class="cw-avatar">
      <img src="./PP Cinta.png" alt="Cinta" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#fff">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
    </div>
    <div class="cw-header-info">
      <div class="cw-name">Cinta</div>
      <div class="cw-status">
        <span class="cw-status-dot"></span>
        Mentor Promates · Online
      </div>
    </div>
    <div class="cw-badge">PROMED UI</div>
  </div>

  <!-- Messages -->
  <div class="cw-messages" id="cw-messages">
    <div class="cw-date">Hari ini</div>
    <div class="cw-row bot" id="cw-initial-msg">
      <div class="cw-msg-avatar">
        <img src="./PP Cinta.png" alt="Cinta" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#2F449B">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </div>
      <div class="cw-bubble">Hi, Promates! Lagi kepikiran apa sekarang? Kita obrolin yuk.</div>
    </div>
  </div>

  <!-- Quick actions -->
  <div class="cw-quick" id="cw-quick">
    <button class="cw-quick-btn" data-query="Daftar 13 peminatan">Explore peminatan</button>
    <button class="cw-quick-btn" data-query="Kepoin mata kuliah">Kepo matkul</button>
    <button class="cw-quick-btn" data-query="Mau stalk magang">Stalk magang</button>
    <button class="cw-quick-btn" data-query="Kepoin capstone">Kepo capstone</button>
  </div>

  <!-- Input -->
  <div class="cw-input-row">
    <textarea
      id="cw-input"
      class="cw-input"
      placeholder="Tanya Cinta sesuatu..."
      rows="1"
      maxlength="400"
    ></textarea>
    <button class="cw-send" id="cw-send" aria-label="Kirim">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 26 24" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L11 13"></path>
        <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
      </svg>
    </button>
  </div>

  <div class="cw-footer">Under Gentle Construction</div>
</div>

<script>
(function () {
  const BACKEND_URL = 'http://localhost:8000/chat'; // ← change in production

  const fab = document.getElementById('cinta-fab');
  const widget = document.getElementById('cinta-widget');
  const messagesEl = document.getElementById('cw-messages');
  const inputEl = document.getElementById('cw-input');
  const sendBtn = document.getElementById('cw-send');
  const quickEl = document.getElementById('cw-quick');

  let sessionId = '';
  let isThinking = false;
  let quickUsed = false;

  // ── Toggle ──
  fab.addEventListener('click', () => {
    const open = widget.classList.toggle('open');
    fab.classList.toggle('open', open);
    if (open) inputEl.focus();
  });

  // ── Avatar SVG helper ──
  function avatarSVG() {
    return `<div class="cw-msg-avatar">
      <img src="./PP Cinta.png" alt="Cinta" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#2F449B">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
    </div>`;
  }

  // ── Add message bubble ──
  function addMessage(role, text) {
    const row = document.createElement('div');
    row.className = `cw-row ${role}`;
    if (role === 'bot') {
      row.innerHTML = `${avatarSVG()}<div class="cw-bubble">${escapeHtml(text)}</div>`;
    } else {
      row.innerHTML = `<div class="cw-bubble">${escapeHtml(text)}</div>`;
    }
    messagesEl.appendChild(row);
    scrollBottom();
    return row;
  }

  // ── Typing indicator ──
  let typingRow = null;
  function showTyping() {
    typingRow = document.createElement('div');
    typingRow.className = 'cw-row bot';
    typingRow.id = 'cw-typing';
    typingRow.innerHTML = `${avatarSVG()}<div class="cw-bubble"><div class="cw-typing-dots"><span></span><span></span><span></span></div></div>`;
    messagesEl.appendChild(typingRow);
    scrollBottom();
  }
  function hideTyping() {
    if (typingRow) { typingRow.remove(); typingRow = null; }
  }

  // ── Scroll ──
  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Escape HTML ──
  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  // ── Send ──
  async function send(text) {
    if (!text.trim() || isThinking) return;
    isThinking = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = '';

    // Quick actions hanya untuk awal chat (sekali dipakai/langsung menghilang).
    if (!quickUsed) {
      quickEl.style.display = 'none';
      quickUsed = true;
    }

    addMessage('user', text);
    showTyping();

    try {
      const res = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });
      const data = await res.json();
      sessionId = data.session_id || sessionId;
      hideTyping();
      addMessage('bot', data.response || 'Maaf, ada masalah. Coba lagi.');
    } catch (err) {
      hideTyping();
      addMessage('bot', 'Koneksi gagal. Pastikan server aktif.');
    } finally {
      isThinking = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // ── Quick buttons ──
  quickEl.addEventListener('click', (e) => {
    const btn = e.target.closest('.cw-quick-btn');
    if (btn) send(btn.dataset.query);
  });

  // ── Send button ──
  sendBtn.addEventListener('click', () => send(inputEl.value));

  // ── Enter key (Shift+Enter = newline) ──
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send(inputEl.value);
    }
  });

  // ── Auto-resize textarea ──
  inputEl.addEventListener('input', () => {
    inputEl.style.height = '';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 90) + 'px';
  });
})();
</script>
</body>
</html>
